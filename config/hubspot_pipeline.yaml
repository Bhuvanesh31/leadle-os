# Rotting thresholds (days without activity before a lead/deal is flagged stale).
# Edit here — no code change needed.
rotting:
  lead_no_activity_days: 1      # process #2 — active lead inactivity threshold
  deal_no_activity_days: 4      # process #4 — active deal inactivity threshold
