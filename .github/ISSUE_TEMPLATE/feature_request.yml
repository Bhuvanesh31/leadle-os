name: Feature request
description: New analytics process, dashboard block, or signal
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New analytics process
        - New dashboard block
        - New signal / trigger
        - New connector / data source
        - Config change (rules, thresholds)
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve
      description: What decision or action would this enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed approach
      description: Script (deterministic) or agent (judgment/narrative)? What data does it need?

  - type: checkboxes
    id: checklist
    attributes:
      label: Before opening
      options:
        - label: Checked that this isn't already covered by an existing slash command
          required: true
        - label: Confirmed the data shape exists in docs/data-shape/ or is available in HubSpot/source tools
