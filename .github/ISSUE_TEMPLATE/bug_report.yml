name: Bug report
description: Something is broken in an analytics script, agent, or dashboard render
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For security issues, email revops@leadle.in instead of opening an issue.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Analytics script
        - Dashboard renderer
        - Client report renderer
        - HubSpot connector
        - Slack brief
        - Slash command
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you run, what did you expect, what actually happened?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      description: Exact command or slash command used
      placeholder: |
        python -m analytics.lead_rotting --period last-month
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Error output
      render: shell
